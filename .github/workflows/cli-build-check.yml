# Throwaway validation for the companion-CLI packaging (#276).
#
# De-risks the experimental `dart build cli` (native-assets) on clean CI runners
# BEFORE wiring it into release.yml: confirms the command succeeds on each desktop
# OS, prints the exact bundle output path, and runs the produced binary.
#
# Manual-only (workflow_dispatch). Delete this file once release.yml packaging is
# confirmed working.

name: CLI build check

on:
  workflow_dispatch:

jobs:
  cli-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Linux build deps
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - run: dart --version
      - run: flutter --version
      - run: flutter pub get
      - name: dart build cli
        run: dart build cli
      - name: Show output tree (bash)
        if: matrix.label != 'windows'
        run: |
          echo "== build/cli tree =="
          find build/cli -maxdepth 3 -print
      - name: Show output tree (pwsh)
        if: matrix.label == 'windows'
        run: |
          Write-Host "== build/cli tree =="
          Get-ChildItem -Path build/cli -Recurse -Depth 3 | Select-Object FullName
      - name: Run the built binary (bash)
        if: matrix.label != 'windows'
        run: |
          bundle=$(ls -d build/cli/*/bundle | head -1)
          echo "bundle: $bundle"
          ls -la "$bundle" "$bundle"/bin "$bundle"/lib || true
          "$bundle"/bin/timedart --version
      - name: Run the built binary (pwsh)
        if: matrix.label == 'windows'
        run: |
          $bundle = (Get-ChildItem -Path build/cli -Recurse -Directory -Filter bundle | Select-Object -First 1).FullName
          Write-Host "bundle: $bundle"
          Get-ChildItem -Recurse $bundle | Select-Object FullName
          & "$bundle/bin/timedart.exe" --version
