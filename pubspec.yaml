name: timedart
description: "Local-first time tracker for jobs and clients, with PDF invoicing."
repository: "https://github.com/craftox-labs/timedart"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
# Pre-1.0 while in beta: the local DB format may still change. 1.0.0 is reserved
# for when migrations are proven across versions (#160) — the "your data is safe"
# promise. Initial download releases ship as 0.9.x betas (#167). Bump the +build
# number each beta so Android's versionCode increments (installs over the last).
version: 0.9.0+10

environment:
  sdk: ^3.12.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  drift: ^2.34.0
  drift_flutter: ^0.3.0 # wraps sqlite3 + path_provider; works on Linux desktop
  path_provider: ^2.1.0 # we reference it directly to pick the DB location
  # Companion CLI (#270/#271): `args` for verb dispatch, and `sqlite3` as a
  # first-class dependency (not just a dev dep) so the pure-Dart CLI DB-open
  # seam and its `dart compile exe` binary can open the app's SQLite file
  # without any Flutter/path_provider runtime.
  args: ^2.5.0
  sqlite3: ^3.3.0

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  pdf: ^3.13.0
  file_selector: ^1.1.0
  flutter_svg: ^2.0.10 # render the logo SVGs (Flutter has no native SVG)
  url_launcher: ^6.3.0 # open the Craftox link in the panel footer
  animations: ^2.2.0
  material_symbols_icons: ^4.2951.0
  web: ^1.1.0 # browser Blob download for the web-demo PDF export
  uuid: ^4.5.0 # UUIDv7 primary keys for sync (PRD #189, Phase 2c)
  share_plus: ^13.2.0
  flutter_slidable: ^4.0.3
  package_info_plus: ^10.2.0
  flutter_markdown_plus: ^1.0.12
  markdown: ^7.3.1
  http: ^1.2.0 # query the GitHub Releases API for the update check
dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.34.0
  build_runner: ^2.4.0

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# App launcher icons — the timedart mark (assets/icon/) centred on the dark app
# background. Regenerate after changing the source PNGs:
#   dart run flutter_launcher_icons
# (Linux desktop uses the AppImage .desktop icon, set in the release workflow.)
flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  adaptive_icon_background: "#0D0D0D"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 21
  ios: true
  macos:
    generate: true
    image_path: "assets/icon/icon.png"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 256

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/fonts/
    - assets/icons/
    # In-app documentation (#252): markdown pages + their images. Directory
    # globs, so dropping another .md page (or an image beside it) into
    # docs/content needs no pubspec change — DocsCatalog picks it up from the
    # asset manifest. Docs ship bundled so they work fully offline.
    - docs/content/
    - docs/content/assets/

  # Mona Sans is a variable font. Flutter maps the theme's `fontWeight` onto its
  # `wght` axis (200–900), so all app weights resolve from the single file.
  # (Replaced Urbanist app-wide.) The invoice PDF renderer can't shift a
  # variable axis, so it uses the pre-instanced static weights below (Regular
  # w400 / Medium w500 / SemiBold w600), loaded via rootBundle from assets/fonts.
  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-VariableFont_wght.ttf
    # Raleway (variable) — display headings, matched to the marketing site's
    # italic headings. fontWeight maps onto the wght axis; the italic file is
    # selected by fontStyle: italic (so w500 + italic = Medium Italic).
    - family: Raleway
      fonts:
        - asset: assets/fonts/Raleway-VariableFont_wght.ttf
        - asset: assets/fonts/Raleway-Italic-VariableFont_wght.ttf
          style: italic
    # Invoice-template families (issue #232). Each ships pre-instanced static
    # Regular/Medium/SemiBold faces (w400/500/600) so the PDF renderer can load
    # one file per weight and the preview resolves the same three weights by
    # fontWeight. IBM Plex Sans, Libre Franklin and Source Serif 4 are instanced
    # from their Google Fonts variable sources; Spectral ships statics upstream.
    # OFL licences live in assets/fonts/licenses/. Family names must match the
    # flutterFamily values in features/invoices/invoice_fonts.dart.
    - family: IBM Plex Sans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSans-SemiBold.ttf
          weight: 600
    - family: Libre Franklin
      fonts:
        - asset: assets/fonts/LibreFranklin-Regular.ttf
          weight: 400
        - asset: assets/fonts/LibreFranklin-Medium.ttf
          weight: 500
        - asset: assets/fonts/LibreFranklin-SemiBold.ttf
          weight: 600
    - family: Source Serif 4
      fonts:
        - asset: assets/fonts/SourceSerif4-Regular.ttf
          weight: 400
        - asset: assets/fonts/SourceSerif4-Medium.ttf
          weight: 500
        - asset: assets/fonts/SourceSerif4-SemiBold.ttf
          weight: 600
    - family: Spectral
      fonts:
        - asset: assets/fonts/Spectral-Regular.ttf
          weight: 400
        - asset: assets/fonts/Spectral-Medium.ttf
          weight: 500
        - asset: assets/fonts/Spectral-SemiBold.ttf
          weight: 600
    - family: Plus Jakarta Sans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
