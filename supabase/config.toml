# Supabase local config for the timedart sync backend (PRD #189, Phase 4).
# Only the write endpoint (#209) lives here; the Postgres source + PowerSync
# Cloud project + sync rules were set up in the dashboard (4a / #208).

[functions.upload-data]
# The bearer sent by the app is a PowerSync Dev Token (signed by PowerSync),
# not a Supabase-project JWT — so the gateway must NOT verify it. The function
# decodes the `sub` claim itself to derive org_id. Trial-only; Phase 5 restores
# verification with a real Supabase/JWKS token.
verify_jwt = false
